name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────
# JOB 1 — Server: type-check + test
# ─────────────────────────────────────────────
jobs:
  test-server:
    name: Server — Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install
        working-directory: server
        run: npm ci

      - name: TypeScript check
        working-directory: server
        run: npx tsc --noEmit

      - name: Tests
        working-directory: server
        run: npm test
        continue-on-error: true

# ─────────────────────────────────────────────
# JOB 2 — Server: build + deploy to EC2
# (only on push to main, not on PRs)
# ─────────────────────────────────────────────
  deploy-server:
    name: Server — Deploy to EC2
    runs-on: ubuntu-latest
    needs: test-server
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install
        working-directory: server
        run: npm ci

      - name: Build
        working-directory: server
        run: npm run build

      - name: Configure SSH key
        if: env.EC2_SSH_KEY != ''
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/quads-key.pem
          chmod 600 ~/.ssh/quads-key.pem
          ssh-keyscan -H 54.167.221.2 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync dist to EC2
        if: env.EC2_SSH_KEY != ''
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/quads-key.pem -o StrictHostKeyChecking=no" \
            server/dist/ \
            ec2-user@54.167.221.2:/home/ec2-user/quads/dist/
          rsync -az \
            -e "ssh -i ~/.ssh/quads-key.pem -o StrictHostKeyChecking=no" \
            server/package.json server/package-lock.json \
            ec2-user@54.167.221.2:/home/ec2-user/quads/

      - name: Restart on EC2
        if: env.EC2_SSH_KEY != ''
        run: |
          ssh -i ~/.ssh/quads-key.pem -o StrictHostKeyChecking=no \
            ec2-user@54.167.221.2 'bash -lc "
              export NVM_DIR=\"\$HOME/.nvm\"
              [ -s \"\$NVM_DIR/nvm.sh\" ] && source \"\$NVM_DIR/nvm.sh\"
              nvm use 16
              cd /home/ec2-user/quads
              npm install --production --prefer-offline --no-audit 2>&1 | tail -5
              pm2 reload quads-api --update-env
              pm2 save
              echo === quads-api status ===
              pm2 show quads-api | grep -E status\|uptime\|restarts
            "'

# ─────────────────────────────────────────────
# JOB 3 — Web: type-check
# ─────────────────────────────────────────────
  type-check-web:
    name: Web — TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit

# Web deploys are handled automatically by Vercel's GitHub integration on push to main.
