name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ─────────────────────────────────────────────
# JOB 1 — Server: type-check + test
# ─────────────────────────────────────────────
jobs:
  test-server:
    name: Server — Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        working-directory: server
        run: npm ci

      - name: TypeScript check
        working-directory: server
        run: npx tsc --noEmit

      - name: Tests
        working-directory: server
        run: npm test
        continue-on-error: true

# ─────────────────────────────────────────────
# JOB 2 — Server: deploy to Railway
# (only on push to main, not on PRs)
# ─────────────────────────────────────────────
  deploy-server:
    name: Server — Deploy to Railway
    runs-on: ubuntu-latest
    needs: test-server
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: echo "Server deployment is handled by Railway's GitHub integration."

# ─────────────────────────────────────────────
# JOB 3 — Web: type-check
# ─────────────────────────────────────────────
  type-check-web:
    name: Web — TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit

# Web deploys are handled automatically by Vercel's GitHub integration on push to main.
