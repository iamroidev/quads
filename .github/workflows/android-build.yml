name: Android EAS Build

on:
  push:
    branches: [main]
    paths:
      # Only rebuild when mobile code or config changes
      - 'mobile/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile deps
        working-directory: mobile
        run: npm ci

      - name: TypeScript
        working-directory: mobile
        run: npx tsc --noEmit

  eas-build:
    name: EAS Build (Android APK)
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile deps
        working-directory: mobile
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        working-directory: mobile
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Building profile: $PROFILE"
          eas build \
            --platform android \
            --profile $PROFILE \
            --non-interactive \
            --no-wait \
            --message "Auto build from commit ${{ github.sha }} — ${{ github.event.head_commit.message }}"

      - name: Post build URL to summary
        if: always()
        working-directory: mobile
        run: |
          echo "## Android Build Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Profile:** \`${{ github.event.inputs.profile || 'preview' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Track the build at: https://expo.dev/accounts/richieroidev/projects/campus-marketplace/builds" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Once complete, scan the QR code or install the APK directly on your Android device." >> $GITHUB_STEP_SUMMARY
