<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUADS | The Official Institutional Marketplace</title>
    <meta name="description" content="The official marketplace for UMaT students. Buy, sell, and trade textbooks, electronics, and services with verified campus members." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quadsmarket.tech/" />
    <meta property="og:title" content="QUADS | The Official Institutional Marketplace" />
    <meta property="og:description" content="Exchange textbooks, electronics, and services within your university community. Secure escrow payments and verified student profiles." />
    <meta property="og:image" content="https://quadsmarket.tech/og-image.png" />
    <meta property="og:site_name" content="QUADS Marketplace" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://quadsmarket.tech/" />
    <meta property="twitter:title" content="QUADS | The Official Institutional Marketplace" />
    <meta property="twitter:description" content="Exchange textbooks, electronics, and services within your university community. Secure escrow payments and verified student profiles." />
    <meta property="twitter:image" content="https://quadsmarket.tech/og-image.png" />

    <!-- Dynamic OG Tags (will be replaced by JS for product pages) -->
    <meta property="og:type" content="product" />
    <meta property="og:price:amount" content="0.00" />
    <meta property="og:price:currency" content="GHS" />
    <meta property="og:availability" content="instock" />

    <link rel="canonical" href="https://quadsmarket.tech/" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Script to dynamically set OG tags for product pages -->
    <script>
      // This script runs after React hydrates to update meta tags for better social sharing
      function updateOGTags() {
        // Only update if we're on a product detail page
        if (window.location.pathname.startsWith('/products/')) {
          // Extract product ID from URL
          const pathParts = window.location.pathname.split('/');
          const productId = pathParts[2];

          if (productId) {
            // Fetch product data to populate OG tags
            fetch(`/api/products/${productId}`)
              .then(response => response.json())
              .then(product => {
                if (product.success && product.data) {
                  const p = product.data;

                  // Update Open Graph tags
                  document.querySelector('meta[property="og:title"]').setAttribute('content', `${p.title} - GHS ${p.price.toFixed(2)}`);
                  document.querySelector('meta[property="og:description"]').setAttribute('content', p.description.substring(0, 200) + '...');
                  document.querySelector('meta[property="og:image"]').setAttribute('content', p.images.length > 0 ? p.images[0].url : 'https://quadsmarket.tech/og-default.png');
                  document.querySelector('meta[property="og:price:amount"]').setAttribute('content', p.price.toFixed(2));

                  // Update Twitter tags
                  document.querySelector('meta[property="twitter:title"]').setAttribute('content', `${p.title} - GHS ${p.price.toFixed(2)}`);
                  document.querySelector('meta[property="twitter:description"]').setAttribute('content', p.description.substring(0, 200) + '...');
                  document.querySelector('meta[property="twitter:image"]').setAttribute('content', p.images.length > 0 ? p.images[0].url : 'https://quadsmarket.tech/og-default.png');
                }
              })
              .catch(() => {
                // Fallback to default OG tags if fetch fails
                console.warn('Could not fetch product data for OG tags');
              });
          }
        }
      }

      // Run after React hydrates (brief delay to let React update the DOM)
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          setTimeout(updateOGTags, 1000);
        });
      } else {
        setTimeout(updateOGTags, 1000);
      }
    </script>
  </body>
</html>
